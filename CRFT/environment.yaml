      - numpy==1.26.4
      - opencv-python-headless
      - albumentations
      - einops==0.3.0
      - kornia==0.4.1
      - loguru==0.5.3
      - yacs==0.1.8
      - tqdm==4.65.0
      - pytorch-lightning==1.3.5
      - torchmetrics==0.6.0
      - h5py==3.1.0
      - joblib
      - matplotlib
      - scipy
      - scikit-image
      - tensorboard
      - wandb
      - pyyaml
      - termcolor
      - thop
      - ptflops
      - torchinfo